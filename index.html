<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alyssa's Substack Stories</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap');

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #FFFAF5;
    font-family: 'DM Sans', sans-serif;
  }

  .card {
    text-align: center;
    padding: 60px 40px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 4vw, 2.6rem);
    color: #1C0A00;
    margin-bottom: 8px;
  }

  h1 em { font-style: italic; color: #F97316; }

  .sub {
    color: #92400E;
    font-size: 15px;
    font-weight: 300;
    margin-bottom: 40px;
  }

  .btn {
    display: inline-block;
    background: #F97316;
    color: white;
    text-decoration: none;
    padding: 14px 32px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 500;
    transition: background 0.2s ease, transform 0.2s ease;
  }

  .btn:hover {
    background: #ea6a0a;
    transform: translateY(-2px);
  }
</style>
</head>
<body>
  <div class="card">
    <h1>Alyssa's <em>Substack Stories</em></h1>
    <p class="sub">Things that happened on the internet</p>
    <a class="btn" href="./orange-story/">🍊 The Orange Story →</a>
  </div>
</body>
</html>
