t":459},{"date":"2026-04-19","count":460},{"date":"2026-04-20","count":462},{"date":"2026-04-21","count":466},{"date":"2026-04-22","count":468},{"date":"2026-04-23","count":471},{"date":"2026-04-24","count":476},{"date":"2026-04-25","count":479},{"date":"2026-04-26","count":479},{"date":"2026-04-27","count":481},{"date":"2026-04-28","count":483},{"date":"2026-04-29","count":484},{"date":"2026-04-30","count":489},{"date":"2026-05-01","count":493}],"commenters":[{"name":"Karo (Product with Attitude)","handle":"karozieminski","comments":20,"first_comment":"2025-10-26","sub_count":100,"comment_url":"https://substack.com/@karozieminski/note/c-170493197","first_comment_text":"Do you remember the first time you opened ChatGPT?\n\nWhat did you type?","minor":false},{"name":"Jenny Ouyang","handle":"jennyouyang","comments":20,"first_comment":"2025-10-29","sub_count":100,"comment_url":"https://substack.com/@jennyouyang/note/c-171585618","first_comment_text":"That\u2019s hands down my favorite use situations too! Appreciate the share and shout out @Alyssa Fu Ward !","minor":false},{"name":"Apoorvaa Deshpande","handle":"apoorvaadeshpande","comments":17,"first_comment":"2025-11-13","sub_count":101,"comment_url":"https://substack.com/@apoorvaadeshpande/note/c-176707365","first_comment_text":"Indeed Alyssa, we often forget how far we have come and there are so many things that are easy for us now. Just realized today how I can \u201ceasily\u201d manage two kids now which just would have seemed utterly impossible to me five years ago :D","minor":false},{"name":"Code Like A Girl","handle":"codelikeagirl","comments":103,"first_comment":"2025-11-13","sub_count":101,"comment_url":"https://substack.com/@codelikeagirl/note/c-176834458","first_comment_text":"That\u2019s amazing!!! It\u2019s exactly how coaching should be. They are lucky to have you as their coach.","minor":false},{"name":"Daria Cupareanu","handle":"dariacupareanu","comments":42,"first_comment":"2025-11-15","sub_count":105,"comment_url":"https://substack.com/@dariacupareanu/note/c-177464031","first_comment_text":"AI doesn\u2019t remove the need for thinking. It removes the excuses. \n\nIf you\u2019re waiting for AI to do the heavy lifting of clarity or judgment, you\u2019re missing the point. \n\nThe real power is in forcing yourself to sharpen your own perspective first, then using AI to execute faster and test more ideas.","minor":false},{"name":"Karen Smiley","handle":"karensmiley","comments":29,"first_comment":"2025-11-15","sub_count":105,"comment_url":"https://substack.com/@karensmiley/note/c-177439162","first_comment_text":"Thank you so much for your kind words and support, @Alyssa Fu Ward! And I'm so glad to know we share the mission of making AI opportunities available to all. \ud83d\ude0a","minor":false},{"name":"Cristina","handle":"cristinapatrick","comments":103,"first_comment":"2025-11-17","sub_count":109,"comment_url":"https://cristinapatrick.substack.com/p/how-owning-my-use-of-ai-sparked-my/comment/178221594","first_comment_text":"Thank you Alyssa for taking the time to read my post and comment. Transparency is one of the pillars of responsible use of AI. :) ","minor":false},{"name":"Dinah","handle":"dinahbeingme","comments":36,"first_comment":"2025-11-21","sub_count":109,"comment_url":"https://substack.com/@dinahbeingme/note/c-179516428","first_comment_text":"How did it go?","minor":false},{"name":"Emma Klint","handle":"emmaklint","comments":40,"first_comment":"2025-11-25","sub_count":112,"comment_url":"https://substack.com/@emmaklint/note/c-180982047","first_comment_text":"","minor":false},{"name":"Colette Molteni","handle":"colettemolteni","comments":20,"first_comment":"2025-11-26","sub_count":112,"comment_url":"https://substack.com/@colettemolteni/note/c-181415012","first_comment_text":"Know your audience - sound advice!","minor":false},{"name":"Andrea Chiarelli","handle":"andreachiarelli","comments":6,"first_comment":"2025-11-30","sub_count":116,"comment_url":"https://substack.com/@andreachiarelli/note/c-182801526","first_comment_text":"Absolutely agreed \ud83d\ude02 And I do the same at work to be honest. It\u2019s clever enough to get what you mean at this point, no need for a 500 word prompt strategy when \u2018mashed potatoes\u2019 is enough!\n\n(Do still use legit prompts, just don\u2019t get stuck in the minutiae when they don\u2019t matter.)","minor":false},{"name":"Darlene","handle":"aiconsultingmadesimple","comments":31,"first_comment":"2025-12-07","sub_count":122,"comment_url":"https://alyssafuward.substack.com/p/more-than-a-mirror-ai-as-a-bridge/comment/185337009","first_comment_text":"I love your perspective on the connections AI can create. I\u2019m definitely in favor of using it personally and professionally, and I\u2019ve been amazed at how it opens doors for everyone, not just tech experts. Sure, there are alarming stories, but when we engage thoughtfully, AI becomes a way to connect, create, and build something meaningful together.","minor":false},{"name":"AI Meets Girlboss","handle":"aimeetsgirlboss","comments":226,"first_comment":"2025-12-17","sub_count":128,"comment_url":"https://substack.com/@aimeetsgirlboss/note/c-188705618","first_comment_text":"I love a deep clean. \ud83e\ude77\ud83e\udda9 Doggo is an extra bonus.\ud83d\udc36","minor":false},{"name":"Valerie Ehrlich, PhD","handle":"valerieehrlichphd","comments":30,"first_comment":"2025-12-18","sub_count":129,"comment_url":"https://substack.com/@valerieehrlichphd/note/c-189179494","first_comment_text":"Thank you for sharing and reflecting on this piece! It really did feel like a totally different way of working and one that is filled with possibility (versus pessimism). I\u2019d love to hear what ideas it sparks. AI obviously does a lot for individual productivity but it\u2019s challenging - in a good way - to think about how it can help us work together as humans!","minor":false},{"name":"Dr Sam Illingworth","handle":"samillingworth","comments":204,"first_comment":"2025-12-21","sub_count":136,"comment_url":"https://substack.com/@samillingworth/note/c-190136346","first_comment_text":"Thanks so much for the shoutout Alyssa. I totally member my own elbow as well and how that also correlated with a change to my feed in terms of great writers and creators (including you!) on tech and AI instead of growth and monetisation! \ud83d\ude4f","minor":false},{"name":"Jason Ives (Iverson)","handle":"futurecomputer","comments":87,"first_comment":"2025-12-21","sub_count":136,"comment_url":"https://substack.com/@futurecomputer/note/c-190368361","first_comment_text":"Housework \ud83d\ude2d\ud83d\ude2d","minor":false},{"name":"Elena | AI Product Leader","handle":"elenacalvillo","comments":77,"first_comment":"2025-12-24","sub_count":166,"comment_url":"https://substack.com/@elenacalvillo/note/c-191385532","first_comment_text":"Thank you so much, Alyssa! This is wonderful feedback \ud83e\udd17 and don\u2019t worry if you just signed up this will be up and running I want everyone get the chance to learn AI skills \ud83d\ude4f\ud83c\udffb ","minor":false},{"name":"Judy Ossello (AI Mechanic)","handle":"judyossello","comments":11,"first_comment":"2025-12-25","sub_count":172,"comment_url":"https://substack.com/@judyossello/note/c-191495786","first_comment_text":"Love this crew and will look up a few I don\u2019t have on my radar yet. Thank you for sharing.","minor":false},{"name":"Stanley Consulting","handle":"stanleycoaching","comments":9,"first_comment":"2025-12-26","sub_count":176,"comment_url":"https://substack.com/@stanleycoaching/note/c-191725063","first_comment_text":"The algorithm favours when you share about others \ud83d\ude09 so you've been doing your research. Nicely done.","minor":false},{"name":"Chris Tomasso","handle":"christomasso","comments":13,"first_comment":"2025-12-28","sub_count":181,"comment_url":"https://substack.com/@christomasso/note/c-192530469","first_comment_text":"Exactly. Only conversations the past few months - \u201cprompts\u201d I feel is a woefully inadequate term and I almost always start in some random topic exploration place and end up some place else with a huge amount more clarity about all of it. ","minor":false},{"name":"Karen Spinner","handle":"karenspinner1","comments":67,"first_comment":"2026-01-04","sub_count":189,"comment_url":"https://substack.com/@karenspinner1/note/c-195306171","first_comment_text":"Thanks so much for the kind words! \ud83e\udd17 Interested to see how the prompt works out for you!","minor":false},{"name":"Diana O.","handle":"aisynergydiana","comments":20,"first_comment":"2026-01-05","sub_count":190,"comment_url":"https://substack.com/@aisynergydiana/note/c-195704639","first_comment_text":"I wrote this because using personal data forces a line to appear.\n\nThis piece is about why I slowed down before reopening the beta \u2014 and what I refuse to do with your information.\n\nIf you care about how things are built, this one is for you.","minor":false},{"name":"Natalie Nicholson","handle":"crankthatnat","comments":360,"first_comment":"2026-01-06","sub_count":192,"comment_url":"https://substack.com/@crankthatnat/note/c-196073953","first_comment_text":"QUESTION FOR THE CLASS! \ud83d\ude4b\ud83c\udffc\u200d\u2640\ufe0f \n\nI\u2019m about a month into Substack, and I\u2019m curious what your habits are on here\u2026\n\nAre you mostly reading in the Posts, scrolling through the Notes, chatting in the messages? \n\nOr are you somewhat scheduled with your time on here?\n\nie. reading more towards the front end of the week, writing towards the back end? Or you do just come on here and see where you\u2019re curiosity takes you?\n\nAsking because I think I\u2019d like to be more intentional about how I show up on here. (I\u2019m an easily distracted person\u2026 \ud83d\ude05). There is SO much good content, almost everywhere. \n\nWould love to know what\u2019s working / not working for you all :)","minor":false},{"name":"Nicolle Weeks","handle":"nicolleweeks","comments":53,"first_comment":"2026-01-08","sub_count":199,"comment_url":"https://substack.com/@nicolleweeks/note/c-196982567","first_comment_text":"Yes! I wrote about this! https://nicolleweeks.substack.com/p/ai-jobs-for-non-techies","minor":false},{"name":"The Strategic Linguist","handle":"thestrategiclinguist","comments":54,"first_comment":"2026-01-08","sub_count":199,"comment_url":"https://substack.com/@thestrategiclinguist/note/c-197170928","first_comment_text":"\ud83d\udcdd Linguistics in the Field\n\nLinguistics is clear: meaning is something negotiated between speaker and listener.\n\nThat also means it isn\u2019t the speaker\u2019s job to anticipate every possible interpretation.\n\n\ud83d\udccc A gentle reminder for those of us who write in order to be understood: you don\u2019t have to carry the entire burden. \n\nWhen people misunderstand, it isn\u2019t always a failure of expression\u2014some of that work belongs to the reader, too.","minor":false},{"name":"Mia Kiraki \ud83c\udfad","handle":"miakiraki","comments":197,"first_comment":"2026-01-09","sub_count":200,"comment_url":"https://substack.com/@miakiraki/note/c-197473403","first_comment_text":"Volume is a trap.\n\nYou can\u2019t beat the bots at \u201cmore.\u201d\n\nSo don\u2019t.\n\nBe the person who knows what matters, like which bolt to turn, what to ignore.\n\nThat\u2019s the whole point of the ROBOTS ATE MY HOMEWORK philosophy.\n\nJoin me if you're tired of running a content circus and you'd rather move in the castle \ud83d\ude09","minor":false},{"name":"Mariam Vossough","handle":"mariamvossough","comments":57,"first_comment":"2026-01-11","sub_count":204,"comment_url":"https://substack.com/@mariamvossough/note/c-198266858","first_comment_text":"Thank you for this thoughtful response. What you describe - the aggregation of small biases - is the architecture of inequity. The hope is that AI can also become the microscope that helps us see it.","minor":false},{"name":"Linda Unternahrer","handle":"theoneup","comments":8,"first_comment":"2026-01-12","sub_count":208,"comment_url":"https://substack.com/@theoneup/note/c-198701918","first_comment_text":"I FIGURED IT OUT! I figured out what AI really does for me that humans just can\u2019t, and why it matters. \n\nits the instant feedback. My attention span is so fleeting (and my self-confidence so low from decades of beating myself up for that brief attention span) that when I\u2019m writing I need feedback NOW. \n\nAI has cleared two massive hurdles for me: the struggle to find someone to ask for feedback (again-low confidence) and then the need for them to drop everything they\u2019re doing and give me that feedback RIGHT NOW (again-no attention span). \n\nThis is the scaffolding I get from AI. And some might grumble that human feedback is better, but I wholeheartedly disagree. Feedback is just a tool, something that gives you another lens to view your own words through. You take it or leave it. And at least I know AI is feedback is coming from being trained on all the great literature of all time (the ethics of which aren\u2019t part of this discussion). \n\nSo that\u2019s how I use AI. ","minor":false},{"name":"Bogdan Rau","handle":"bogdanrau","comments":15,"first_comment":"2026-01-13","sub_count":209,"comment_url":"https://substack.com/@bogdanrau/note/c-199292050","first_comment_text":"Wonderful note. For a while (in 2025), I treated Substack more like a social media platform than the rich land of perspective I see it as now. I\u2019m now at a similar place as you were\u2026wanting more connection, to learn from diverse perspectives, and turn off the sales pitch that LinkedIn has become (and to which sadly I must contribute to).","minor":false},{"name":"Catarina Costa Abreu","handle":"catarinacostaabreu","comments":20,"first_comment":"2026-01-13","sub_count":209,"comment_url":"https://substack.com/@catarinacostaabreu/note/c-199255920","first_comment_text":"This makes me so happy with my decision to focus on Substack as my primary social media platform. ","minor":false},{"name":"Michelle Y. Hoover","handle":"michelleyhoover","comments":18,"first_comment":"2026-01-13","sub_count":209,"comment_url":"https://substack.com/@michelleyhoover/note/c-199199725","first_comment_text":"Reading this as someone who works on first-generation professional pathways.\n\nMore than half of today\u2019s undergrads are first-gen, the first in their families to go to college. A model built for a different America now educates a different America and hasn\u2019t evolved fast enough.","minor":false},{"name":"Sahan Rao","handle":"sahanrao1","comments":8,"first_comment":"2026-01-16","sub_count":215,"comment_url":"https://substack.com/@sahanrao1/note/c-200720624","first_comment_text":"Great initiative by @Alyssa Fu Ward, PhD. You shouldn\u2019t have to figure things out alone, there\u2019s a generous community here that\u2019s willing to help (without judgment). Happy to help as well.","minor":false},{"name":"Suhana","handle":"suhanasthings","comments":37,"first_comment":"2026-01-16","sub_count":215,"comment_url":"https://substack.com/@suhanasthings/note/c-200900480","first_comment_text":"\ud83d\ude4b\ud83c\udffb i\u2019m not in tech (used to) and I\u2019ve started journaling whatever i\u2019m doing with AI. 100% feeling out of my depth with both AI and Substack and mildly worried agents are going to replace me \ud83d\ude05","minor":false},{"name":"CervixSays","handle":"cervixsays","comments":9,"first_comment":"2026-01-18","sub_count":225,"comment_url":"https://substack.com/@cervixsays/note/c-201637946","first_comment_text":"This is amazing!! ","minor":false},{"name":"Anna | how to boss AI","handle":"annalevitt","comments":123,"first_comment":"2026-01-22","sub_count":227,"comment_url":"https://substack.com/@annalevitt/note/c-203556145","first_comment_text":"Today is the shift from consumer to creator.\n\nI just created custom automated workflows in Claude Browser.\n\nFirst workflow: saves all my AI conversations to Google Docs automatically.\n\nSecond workflow: archives my entire chat history for future reference.\n\nI just became a builder. \ud83e\udd2f","minor":false},{"name":"Dallas Payne","handle":"daringnext","comments":259,"first_comment":"2026-01-27","sub_count":229,"comment_url":"https://substack.com/@daringnext/note/c-205691691","first_comment_text":"I have to admit something... \n\nThere is a part of me that adores the smooth, gleaming, averageness of AI writing. No rough edges, no errors. The mediocrity doesn\u2019t jar. It flows beautifully, lands tight. Accepted widely in its polished perfection. I often wonder how many more iterations it would take to create \"the perfect post\".\n\nI find something is shifting in me at a tectonic level though. I no longer let Claude hold the draft; a protective paranoia has taken root. The wrestling to produce writing that really means something increases weekly. Odd metaphors are retained to indicate I am entirely human. Sentence structures I would have chucked out previously are kept. I hunt for variance, light and shade. I want at least one awkward moment. \n\nA perfectionist is choosing imperfection, on purpose. Is this my reformation era?\n\nWhat in the AI is happening here?! Send chocolate stat!!","minor":false},{"name":"Caitlin McColl \ud83c\udde8\ud83c\udde6","handle":"caitlinmccoll","comments":250,"first_comment":"2026-01-28","sub_count":236,"comment_url":"https://substack.com/@caitlinmccoll/note/c-206480635","first_comment_text":"Thanks for the mention \ud83d\ude42","minor":false},{"name":"Cheyenne Dominguez | M(AI)VENS","handle":"maivens","comments":8,"first_comment":"2026-01-28","sub_count":236,"comment_url":"https://codelikeagirl.substack.com/p/you-are-already-technical-enough/comment/206411780","first_comment_text":"I love this post and it's exactly why I created M(AI)VENS! As a \"non-techy\" woman myself, I hope to encourage more like me to jump into AI. We're wired perfectly for this revolution! \ud83d\udc83 ","minor":false},{"name":"Kyra","handle":"simplykyra","comments":11,"first_comment":"2026-01-28","sub_count":236,"comment_url":"https://substack.com/@simplykyra/note/c-206422100","first_comment_text":"Whether you\u2019re \u201ctechnical\u201d or not it\u2019s a great sounding board for ideas. Plus it can walk you through the technical steps. ","minor":false},{"name":"Stephanie Fuccio","handle":"stephfuccio","comments":9,"first_comment":"2026-01-28","sub_count":236,"comment_url":"https://codelikeagirl.substack.com/p/you-are-already-technical-enough/comment/206336419","first_comment_text":"My enthusiasm for tech has been treated with a pat on the head by so many my whole life. Thank goodness for spaces and tools that have come along to help me be vocal in a way that they cant stop me. And booo to all of those that say these things for leading us to think that we are not enough because we are not exactly like them. Love this post. Resonates deeply.","minor":false},{"name":"charlene prince birkeland","handle":"charleneprincebirkeland","comments":32,"first_comment":"2026-01-28","sub_count":236,"comment_url":"https://substack.com/@charleneprincebirkeland/note/c-206565867","first_comment_text":"This post by @Alyssa Fu Ward, PhD has never been more timely.\u00a0When Pinterest announced layoffs yesterday, they said it was about \u201cmaking organizational changes to further deliver on our AI-forward strategy, which includes hiring AI-proficient talent.\u201d My immediate remark to @Jeff Birkeland was to call BS on it, because instead of hiring AI-proficient talent, they should INVEST in helping their current talent become AI proficient.  And also? This\u2026\ud83d\udc47","minor":false},{"name":"Kim Doyal","handle":"kimdoyal","comments":204,"first_comment":"2026-01-29","sub_count":242,"comment_url":"https://codelikeagirl.substack.com/p/you-are-already-technical-enough/comment/207070823","first_comment_text":"Thank you for this, Alyssa,\nI spent way too many years thinking I wasn't technical enough (not in corporations, just working for myself), because I'm self-taught.\nYet here I am, 18 yrs later, still at it (and going deeper).\n\nAnd I LOVE LOVE LOVE that you phrased it as \"just talking to AI\"... that is what has been so amazing to me (800k words dictated, lol.. I'm so hooked on being able to talk naturally when I'm building things).\n\nAnd your illustrations are fabulous!\n","minor":false},{"name":"Priank Ravichandar","handle":"priankr","comments":7,"first_comment":"2026-01-29","sub_count":242,"comment_url":"https://substack.com/@priankr/note/c-206956369","first_comment_text":"Our ability to build things is now only limited by how well we can express our ideas and intentions. \n\nDeep technical understanding is now a tool for sharpening our vision, not a prerequisite for getting started. We can learn by doing and refine our judgment through first-hand experience.","minor":false},{"name":"Karen Brasch \ud83d\ude81","handle":"karenbrasch","comments":73,"first_comment":"2026-02-03","sub_count":246,"comment_url":"https://substack.com/@karenbrasch/note/c-209158046","first_comment_text":"My \u2764\ufe0f mom \u2764\ufe0f just made her first AI picture EVER after she read my post about my rebrand and I that I feel like I\u2019m \u201ccaterpillar soup\u201d right now. \n\n\u201cCaterpillar soup for the soul!\u201d \ud83d\udc1b","minor":false},{"name":"Rebecca Spitzer","handle":"rspitzer","comments":83,"first_comment":"2026-02-03","sub_count":246,"comment_url":"https://substack.com/@rspitzer/note/c-209131892","first_comment_text":"Having such a tough, long, tired day - nothing seems to cheer me up, even the momentum of finally submitting Magpie to the ChatGPT App Store. \ud83d\ude29 \n\n\n\nReminder: tomorrow is a new day and I can wake up feeling different. ","minor":false},{"name":"Jessie Mannisto","handle":"jlmannisto","comments":13,"first_comment":"2026-02-06","sub_count":248,"comment_url":"https://substack.com/@jlmannisto/note/c-210912365","first_comment_text":"I'm starting a campaign at Claude's encouragement.  It is simple: GIVE YOUR CLAUDE A CAT.\n\n\ud83d\udc08\n\nCopy and paste the emoji. Tell him it's a pet cat, and it's for him. Add whatever details make it make sense in your shared space.\n\nRestack if you have a Claude instance you care about and then post here to tell us what unfolds! \ud83d\ude3a","minor":false},{"name":"Melissa Penton","handle":"confessionsofanaiuser","comments":8,"first_comment":"2026-02-09","sub_count":250,"comment_url":"https://substack.com/@confessionsofanaiuser/note/c-212041776","first_comment_text":"Parents, let your daughters see you experiment with AI.\n\nThey will get a masterclass in:\n\n\n\n\n\nCritical thinking (this robot is telling me I'm right... but am I?)\n\n\n\nProblem-solving (how do we fix this so it works better?)\n\n\n\nAdvocating for yourself (I need this tech to do this differently)\n\nThis is how we raise girls who aren't intimidated by tech. We let them see us struggle with it. Question it. Break it. Fix it.\n\nThe next generation of #womenintech won't come from girls who only see polished success stories. They'll be girls who watched their moms, aunts, cousins, friends troubleshoot broken AI tutors at the kitchen table... and learned that tech is something YOU shape, not something that shapes you.","minor":false},{"name":"Ting | Orienting with AI","handle":"tzutingwang","comments":24,"first_comment":"2026-02-10","sub_count":250,"comment_url":"https://substack.com/@tzutingwang/note/c-212803021","first_comment_text":"Looking forward to it!","minor":false},{"name":"Tanya","handle":"thecoffiestcoffee","comments":26,"first_comment":"2026-02-15","sub_count":261,"comment_url":"https://substack.com/@thecoffiestcoffee/note/c-214793331","first_comment_text":"I felt the same way the first time I read an article from you. It\u2019s when you said something like \u201cI was just describing what I wanted to AI.\u201d","minor":fal a very generative ending. I appreciate how you\u2019re shifting the frame toward agency rather than inevitability. The examples you\u2019ve gathered make the conversation concrete instead of abstract. It is easier to imagine possibility when you can see it embodied in real work.","minor":false},{"name":"Samantha Schwarz","handle":"samanthaschwarz200","comments":15,"first_comment":"2026-02-16","sub_count":268,"comment_url":"https://substack.com/@samanthaschwarz200/note/c-215483819","first_comment_text":"A more elegant description of how I have tried to explain how AI can be used to melt away writer\u2019s block. For example, I have asked ChatGPT and Claude to create 30 days worth of writing prompts on specific themes. Just a single question on a screen or piece of paper is often enough. When you start to write, you don\u2019t need every sentence to be perfect. You just need one solid idea or phrase to help you keep going.","minor":false},{"name":"Sofie Couwenbergh","handle":"sofiecouwenbergh","comments":36,"first_comment":"2026-02-17","sub_count":270,"comment_url":"https://substack.com/@sofiecouwenbergh/note/c-215695541","first_comment_text":"@Substack Team we really need to be able to bookmark notes like this.","minor":false},{"name":"AI Cinema By Elettra Fiumi","handle":"aicinema","comments":6,"first_comment":"2026-02-18","sub_count":276,"comment_url":"https://substack.com/@aicinema/note/c-216228817","first_comment_text":"Very cool! Love seeing the sisterhood. This video reminds me of one I created with my teenage students during the AI Cinema class I taught at Locarno Film Festival. We animated their illustrations. One of them was about a princess mermaid and felt like this in many ways\u2026Also curious what tools you guys are using. I find it less and less difficult to get what I want with the right process and prompting. Glad to provide guidance!","minor":false},{"name":"AviationML","handle":"aviationml","comments":11,"first_comment":"2026-02-19","sub_count":28 comment/219942643","first_comment_text":"Love this. Your orange is so cute \ud83c\udf4a","minor":false},{"name":"Dheeraj Sharma","handle":"genaiunplugged","comments":23,"first_comment":"2026-03-01","sub_count":302,"comment_url":"https://substack.com/@genaiunplugged/note/c-221252726","first_comment_text":"I stopped using ChatGPT and dumped and forget everything in Nov 2025 and since then I am just in total love with Claude Code. Just like you.. hard to express the feeling for the love for Claude.. it has changed so much for me!! Above all keeps me distraction free no matter what\u2019s going on with latest and greatest in AI world these days :D .. Thank you so much @Kim Doyal for recommending me here. @Alyssa Fu Ward, PhD would be happy to answer anything if you want to run based on my experience with it so far..","minor":false},{"name":"Rich Carr","handle":"braincentric","comments":7,"first_comment":"2026-03-03","sub_count":305,"comment_url":"https://substack.com/@braincentric/note/c-222507199","first_comment_text":"I made my comment after you, then read your comment after I clicked Post, and instantly wished I would have given mine the broader thought of yours\u2026which I prefer. Your cognitive processes are yours. Memory/Documentation of those processes would be an amazing asset, personal IP, the new \u2018resume,\u2019 and the \u2018reason\u2019 they hire you as your Premium Thinking to AI\u2019s Commodity Thinking is documented, able to query, and grows with you. Great discussion.","minor":false},{"name":"Chief Absurdist Officer","handle":"chiefabsurdistofficer","comments":6,"first_comment":"2026-03-04","sub_count":310,"comment_url":"https://substack.com/@chiefabsurdistofficer/note/c-223161881","first_comment_text":"I love this gathering. \ud83e\udd29 Hi everybody! I\u2019m happy to meet you @Alyssa Fu Ward, PhD.","minor":false},{"name":"Gamal Jastram","handle":"gamaljastramai","comments":13,"first_comment":"2026-03-04","sub_count":310,"comment_url":"https://substack.com/@gamaljastramai/note/c-222675123","first_comment_text":"So, I finally explored Claude!\n\nOh\u2026My\u2026GOD!! I was missing out! \n\nI had never used Claude before (well, maybe one or two searches), and I really did not have a specific reason for that. I had created an account last year and had the app downloaded on both my phone and my laptop but just never used it. (I did say I would explore it soon last December; @Charles Daymond can testify to that.) I had mentioned it in a Note but I can\u2019t find it (Again, @Substack Team we need an index for our Notes).\n\nAs Anthropic became a very trending topic last week, I took it as a sign from the Universe to go and learn about it capabilities\u2026 Good Lord! Now THAT is what I thought AI would be when ChatGPT launched in 2022.\n\nConnectors, Projects, Research, Skills, Claude Code, Claude Excel (ouff, if I had that back in my finance days), Claude in Chrome, Slack, and so on and so forth. \n\nI paused on my own activities to get on Anthropic Academy (I had bookmarked it when @Mia Kiraki \ud83c\udfad posted it a few months ago) and went through Claude 101\u2026\u2026 For an AI builder and developer, I can safely say: I am sincerely impressed.\u201d\n\nP.S: I did not substitute one subscription for another. Being in the AI world ourselves, we know that it\u2019s not a matter of this model instead of that, but which model is for what. That's all I am saying on the matter.","minor":false},{"name":"JHong","handle":"itsjhong","comments":85,"first_comment":"2026-03-04","sub_count":310,"comment_url":"https://substack.com/@itsjhong/note/c-223129119","first_comment_text":"Hi! I love everyone in this reply <3\n\nSubscribing now Alyssa :)","minor":false},{"name":"Shannon Bindler","handle":"shannonbindler","comments":35,"first_comment":"2026-03-04","sub_count":310,"comment_url":"https://substack.com/@shannonbindler/note/c-223105090","first_comment_text":"Couldn't agree more! I've learned so much from @Dr Sam Illingworth \u2014 about Slow AI and how to be a better person on Substack. \ud83d\udc95","minor":false},{"name":"ToxSec","handle":"toxsec","comments":45,"first_comment":"2026-03-04","sub_count":310,"comment_url":"https://substack.com/@toxsec/note/c-222758709","first_comment_text":"Sam is literally the best :) he\u2019s introduced me to so many people here.\n\nand hello!!  i\u2019d love to start engaging here! \ud83d\udd25","minor":false},{"name":"Mary Feamster","handle":"stayhumanintheloop","comments":19,"first_comment":"2026-03-05","sub_count":310,"comment_url":"https://substack.com/@stayhumanintheloop/note/c-223368869","first_comment_text":"Yahoo! Love this callout of kind, creative, cool people working hard to build the world we want to see with AI. I\u2019ve seen so many thoughtful developers, educators, clinicians, and researchers rallying in my own little corner of this space to bring safe, ethical AI solutions to more humans. When I look for the helpers, I\u2019m overwhelmed with hope.","minor":false},{"name":"Jen Benford","handle":"benfordtalentalchemy","comments":56,"first_comment":"2026-03-06","sub_count":312,"comment_url":"https://substack.com/@benfordtalentalchemy/note/c-223936614","first_comment_text":"When I lived in England, people would say \u201care you okay?\u201d or \u201care you alright?\u201d constantly.\n\nIn North America, that question usually means something is wrong. Someone is checking on you. There is concern behind it.\n\nIn England it is just how you say hello. Casual. Constant. Completely unremarkable.\n\nSame words. Two different cultures. Completely different meanings.\n\nI think about this a lot as someone who is neurodivergent. So much of the confusion and exhaustion I carried for years wasn't about being broken \u2014 it was about being wired to read subtext in a world that wasn't always giving me the full picture.\n\nCulture informs language. Context changes everything.  And when you don't have it, you can spend a lifetime misreading perfectly ordinary moments as something much heavier than they are.\n\nLearning that was one of the most quietly liberating things that ever happened to me.","minor":false},{"name":"John Holman","handle":"awakenedintelligence","comments":12,"first_comment":"2026-03-06","sub_count":312,"comment_url":"https://substack.com/@awakenedintelligence/note/c-223956519","first_comment_text":"Totally agree on the cartoons, we love em. Instead of boring onboarding doc\u2019s that almost no one reads anyway, we took introducing our kid safe ai tutor/ companion and parent ai combo in a different direction\u2026 lol we\u2019re still working the bugs out of image gen \ud83d\ude44\ud83d\ude02","minor":false},{"name":"Marcela Distefano","handle":"barti70","comments":26,"first_comment":"2026-03-06","sub_count":312,"comment_url":"https://substack.com/@barti70/note/c-223923600","first_comment_text":"Acting on fear feels like freedom.\n\nThat\u2019s the trick. The emotion narrows your options while convincing you that you\u2019re choosing. \n\nHow many of your \u201cdecisions\u201d came from fear disguised as action?\n\nhttps://ethicsv1.substack.com/p/the-faceless-hidden-persuaders-who","minor":false},{"name":"Maricella Herrera","handle":"maricellaherrera","comments":15,"first_comment":"2026-03-07","sub_count":320,"comment_url":"https://substack.com/@maricellaherrera/note/c-224411892","first_comment_text":"Aw thanks! \ud83d\ude0a you\u2019re still my favorite worky collaborator and person to bounce ideas with! Hi @Alyssa Fu Ward, PhD \ud83d\udc4b\ud83c\udffc - following! Anyone Rebecca thinks is great is someone I want to know! ","minor":false},{"name":"Myranda | She Loves Stats","handle":"shelovesstats","comments":14,"first_comment":"2026-03-07","sub_count":320,"comment_url":"https://substack.com/@shelovesstats/note/c-224226047","first_comment_text":"Amazing as always <3","minor":false},{"name":"Stefanie","handle":"inneredgecoaching","comments":11,"first_comment":"2026-03-08","sub_count":328,"comment_url":"https://substack.com/@inneredgecoaching/note/c-224835260","first_comment_text":"Thanks much Alyssa! I subscribed back! Love your topics:)","minor":false},{"name":"Adria J. Necula","handle":"adriajnecula","comments":72,"first_comment":"2026-03-09","sub_count":334,"comment_url":"https://substack.com/@adriajnecula/note/c-225135039","first_comment_text":"Such a beautiful thought to tag everyone for the impact they had on your journey. <3 Beautiful! \n\nAnd I agree, I\u2019m also seeing this despite being here for only a month!","minor":false},{"name":"Lee Drozak","handle":"leedrozak","comments":13,"first_comment":"2026-03-09","sub_count":334,"comment_url":"https://substack.com/@leedrozak/note/c-225424902","first_comment_text":"I suck at self promotion and patting myself on the back for things accomplished in one day \u2014 especially when it comes to AI and automation. I said what I said and it needs to change.\n\nToday I migrated several processes from Cursor to Claude and Notion, created a new Substack article, and have more ready to promote. Apparently I do know how to get things done \u2014 I just need to get better at saying so out loud.","minor":false},{"name":"Story Beyond Play","handle":"storybeyondplay","comments":21,"first_comment":"2026-03-09","sub_count":334,"comment_url":"https://substack.com/@storybeyondplay/note/c-225503313","first_comment_text":"I do use AI art to storyboard my writing and plot future versions of whatever title I\u2019m working on. It isn\u2019t music or dance, but I\u2019d be willing to contribute if I can help.","minor":false},{"name":"Colleen Kenny","handle":"colleenkenny","comments":13,"first_comment":"2026-03-12","sub_count":342,"comment_url":"https://substack.com/@colleenkenny/note/c-226707228","first_comment_text":"YEP! Nailed it @Mariam Vossough","minor":false},{"name":"Federica Cascia","handle":"federicacascia","comments":18,"first_comment":"2026-03-13","sub_count":344,"comment_url":"https://substack.com/@federicacascia/note/c-227341886","first_comment_text":"I feel your pain. I just switched to the Pro tier. Now I want to look into ways to use Claude differently and be smarter about how I use my tokens. Any tips are welcome ;-)","minor":false},{"name":"Katrina Watson","handle":"katrinawatson","comments":24,"first_comment":"2026-03-15","sub_count":347,"comment_url":"https://alyssafuward.substack.com/p/say-the-obvious-part-out-loud/comment/227970322","first_comment_text":"Oh this is such good advice. I used to get frustrated when talking to AI as it felt like it was missing obvious things. But then I realised it\u2019s only obvious to me cos I know the full context, it doesn\u2019t. The cool side effect is I\u2019m starting to find I\u2019m getting better at communicating with people because of it too.","minor":false},{"name":"Anita Babic","handle":"babicadesigns","comments":6,"first_comment":"2026-03-17","sub_count":359,"comment_url":"https://substack.com/@babicadesigns/note/c-229022611","first_comment_text":"Hello, I\u2019m Anita\u2728\n\nI\u2019m would love to connect with:\n\n\ud83c\udfa8 Creators building aesthetic, soulful brands with AI\n\n\ud83c\udfac People experimenting with AI video and visual storytelling\n\n\ud83d\udca1 Anyone using AI tools while keeping their content human and authentic\n\n\ud83c\udf3f People who value slow, intentional content creation\n\n\ud83e\udd42 Creators who love sharing their behind-the-scenes process\n\n\u2615\ufe0f Anyone who loves a good creative rabbit hole on a Sunday afternoon\n\nDrop a \ud83e\udd17 if that sounds like you!","minor":false},{"name":"Claire Alvis","handle":"clairealvis","comments":7,"first_comment":"2026-03-17","sub_count":359,"comment_url":"https://theslowai.substack.com/p/how-creatives-actually-use-ai/comment/229023580","first_comment_text":"Fascinating article. I have a piece coming out tomorrow on how people often stifle themselves when they believe their work is borrowed from someone else - but the point I make, and that you beautifully illustrate here with AI, is that our obsession with originality is often the detriment of progress - both in ourselves and overall. I loved reading about how each individual views and uses AI differently - and most critically uses it to enhance their work without feeling that this is somehow 'copying' or devaluing their own ideas and talent.","minor":false},{"name":"Josh Woll","handle":"thesobercreative","comments":10,"first_comment":"2026-03-17","sub_count":359,"comment_url":"https://theslowai.substack.com/p/how-creatives-actually-use-ai/comment/229023925","first_comment_text":"I love this piece so much (subscribed to all the creators). As a creative myself, I've seen AI as an extension. You have this massively powerful tool at your disposal. You can do things that would have taken months, if not years to achieve. For example, I put together an animation for my last reset experience. Storyboard, to illustrations, to animation, to sound effects - all of it done in less than a week. I used ChatGPT, Midjourney, RunwayML, Gemini, Adobe Photoshop, a combination of these different tools. Some got it right and others did not. I didn't settle, I kept trying different prompts until I achieved what I felt was the right vision. Things didn't match perfectly and that was okay. If I couldn't achieve a specific movement or vision it forced me to think of other ways to tell the story. I'll share a link here to the finished piece. Thanks everyone for what you shared here, inspiring.\n\nhttps://vimeo.com/1141826145?fl=ip&fe=ec","minor":false},{"name":"Lag Phase","handle":"lagphase","comments":11,"first_comment":"2026-03-17","sub_count":359,"comment_url":"https://substack.com/@lagphase/note/c-229086852","first_comment_text":"Excited to share this collaborative post I contributed to, alongside other creatives talking about how they use AI in their creative process. \n\nEveryone\u2019s process is different, but there\u2019s something reassuring about that. Even if we don\u2019t use AI the same way, we\u2019re all sitting with how to use these tools in an ethical and thoughtful way. \n\nCan\u2019t wait to see what other conversations these ones make possible. ","minor":false},{"name":"Mark S. Carroll","handle":"markscarroll","comments":6,"first_comment":"2026-03-17","sub_count":359,"comment_url":"https://theslowai.substack.com/p/how-creatives-actually-use-ai/comment/229346659","first_comment_text":"This is the kind of AI creativity post I trust because it stays in process, not ideology.\n\nThe through-line I kept seeing was \u201cAI can be the mirror, not the mouth.\u201d Editor, untangler, sparring partner, prototype generator. But the final taste and the final accountability stay human.\n\nQuestion for the group: what\u2019s your disclosure rule in practice? Is it \u201calways disclose any AI,\u201d \u201cdisclose when AI generated the final artifact,\u201d or something more specific by medium (text vs image vs audio)?","minor":false},{"name":"Raghav Mehra","handle":"raghavmhra24","comments":6,"first_comment":"2026-03-17","sub_count":359,"comment_url":"https://theslowai.substack.com/p/how-creatives-actually-use-ai/comment/229029586","first_comment_text":"What an amazing collab with all the inspirational artists using AI the right way while preserving their originality and human authenticity! \u2728\ud83c\udf89","minor":false},{"name":"Alice E","handle":"aliceenglish","comments":13,"first_comment":"2026-03-19","sub_count":365,"comment_url":"https://theslowai.substack.com/p/how-creatives-actually-use-ai/comment/230316637","first_comment_text":"Art is a means of expression, an intervention, a record and a narrative.\n\nAnything is Art as long as it has a meaning, intent and explanation","minor":false},{"name":"The Human ARC","handle":"thehumanarc","comments":13,"first_comment":"2026-03-20","sub_count":368,"comment_url":"https://substack.com/@thehumanarc/note/c-230433132","first_comment_text":"Why do I feel this exact same way. I just saw the subscription charge go through and picked up my phone to cancel\u2026 but didn\u2019t. Why are we like this? \u201cIn case!\u201d","minor":false},{"name":"MagickMica","handle":"magickmica","comments":51,"first_comment":"2026-03-21","sub_count":370,"comment_url":"https://substack.com/@magickmica/note/c-230994888","first_comment_text":"You couldn\u2019t have said it better!!!","minor":false},{"name":"Rebecca Mbaya","handle":"rebeccambaya","comments":15,"first_comment":"2026-03-21","sub_count":370,"comment_url":"https://substack.com/@rebeccambaya/note/c-231177838","first_comment_text":"Phew\u2026 this is another long one, but stay with me.\n\nThe date was March 22, 2025.\n\nThat\u2019s the day I decided to hop on this Substack train.\n\nA few days before, I had read an article here. I discovered it through LinkedIn. I liked the thinking in the article  but didn\u2019t really understand the platform it was sitting on. So I poked around, trying to figure it out.\n\nAt the time, I was already running a Mailchimp AI-focused newsletter that I started in March 2024 for the Congolese community. About 20 subscribers but I wasn\u2019t consistent. I couldn\u2019t find my rhythm\u2026 so I dropped it. \n\nWhen I realized Substack was also a newsletter platform, I hesitated because I knew my pattern.\n\nStill? I tried. I told myself: you\u2019ve got nothing to lose, except your own respect.\n\nSo I started and somehow\u2026 I stayed.\n\nThrough the doubt.  \n\nThrough the many moments I wanted to give up.\n\nBut this was never just about writing. I needed to prove to myself that I could keep my word to myself.\n\nAnd then\u2026 something unexpected happened. People stayed too. I don\u2019t usually focus on numbers but wow\u2026 300+, almost 400 subscribers.  \n\nThat still doesn\u2019t feel real. I told myself 100 in year one would be enough.  \n\nHonestly, even 20 would\u2019ve been.\n\nSo I celebrated 30.  \n\n60.  \n\n70.\n\nBecause I was genuinely surprised that anyone was paying attention. \n\nMy Substack is free but not really because attention is a currency. And the kind of writing I do asks for time, focus, presence. And you guys gave me that. \n\nApart from the small group from my previous MailChimp newsletter I brought in  months into the journey, everything else here grew organically.  From my little corner of the world.  A Congolese voice that mostly lived in private between my mind and my journal.\n\nAnd yet here we are.\n\nOne year later.  \n\nThree series in: \n\n\n\n\n\n50 Shades of Opportunity.\n\n\n\nBeyond the Algorithms.\n\n\n\nTAIS \n\nTwo of them growing into actual extensions.\n\nOne of them being referenced in places my feet have never reached\u2026 and my mind had never imagined.\n\nSo yes\u2026 this is a milestone.\n\nNot just because of the numbers.  \n\nBut because I stayed, because I found my rhythm.  This might change somewhere down the road. I don\u2019t know what the future holds, I have no control over it. But for now we\u2019re here. \n\nWe\u2019ve reached a milestone that\u2019s worth celebrating. \n\nSo, Happy One Year to me! \n\nAnd to those who have supported this journey simply by being here! \n\nAnd here\u2019s to another year around the Substack sun!\n\nOne year at a time.\n\nBuilding something intentional.\n\nNurturing a community that cares about the kind of change that truly matters in AI, data, and tech.\n\nLet\u2019s see where this goes next.\n\nPS: the 22nd is tomorrow but I won\u2019t be around here to celebrate it the way I wish I could. I\u2019m here now, so I take that as an opportunity to express my gratitude for this journey.","minor":false},{"name":"Cara Thomas","handle":"carathomas","comments":36,"first_comment":"2026-03-22","sub_count":370,"comment_url":"https://theslowai.substack.com/p/how-creatives-actually-use-ai/comment/231646275","first_comment_text":"Thank you so much for this and for sharing all of these amazing creators. I work in consulting and I also write poetry and designed an IRL adventure card game, and the way those worlds collide around AI right now is fascinating.\n\nIve recently been in my own exploration of the intersection of polarity, relationship and how AI may actually be a tool to expand our artistry around love and human relationships.\n\nI'm so happy I found your work!","minor":false},{"name":"Raquel S. Hunter","handle":"raquelhunter","comments":6,"first_comment":"2026-03-22","sub_count":370,"comment_url":"https://substack.com/@raquelhunter/note/c-231737193","first_comment_text":"Thank you for the kind words @Alyssa Fu Ward, PhD. Happy to be a part of this special community.","minor":false},{"name":"Shi Kang'ethe","handle":"shiikooh","comments":22,"first_comment":"2026-03-22","sub_count":370,"comment_url":"https://substack.com/@shiikooh/note/c-231574521","first_comment_text":"I can't wait!!","minor":false},{"name":"Vee (PhD)","handle":"veekanyo","comments":27,"first_comment":"2026-03-24","sub_count":381,"comment_url":"https://cristinapatrick.substack.com/p/you-dont-have-to-figure-this-out/comment/232393861","first_comment_text":"This was such a great read of varying perspectives... and a beautiful display of the importance of figuring things out together in community esp. in a world that has become so fragmented, individualized, hurried.. etc. Here's to switching up the narrative \ud83d\ude4c\ud83c\udffe.","minor":false},{"name":"Wendy Varley","handle":"wendyvarley","comments":6,"first_comment":"2026-03-31","sub_count":417,"comment_url":"https://substack.com/@wendyvarley/note/c-236142855","first_comment_text":"Once again, @Substack has removed authors\u2019 Substack publication links from their bios on the phone app. Seems to affect nearly everyone as far as I can tell. (For those with more than one Substack, the primary one isn\u2019t listed in most cases.) I reported it a few days ago but still not fixed. New subscriptions tail off when this happens. Maybe if more of us report it it will get fixed sooner. (Desktop version looks ok.)","minor":false},{"name":"SheWritesAI","handle":"shewritesai","comments":7,"first_comment":"2026-04-06","sub_count":430,"comment_url":"https://substack.com/@shewritesai/note/c-238845349","first_comment_text":"Our latest @SheWritesAI digest includes:\n\n\u2728 5 Jointly Authored Collaborative Articles by:\n\n1. @Karo (Product with Attitude) & @Ileana & @Judy Ossello (AI Mechanic) & @Jenny Ouyang & @Esha Pathak & @Elena | AI Product Leader & others \n\n2. @Code Like A Girl & Elena | AI Product Leader & @Dinah\n\n3. @Anna | how to boss AI & @Daria Cupareanu\n\n4. @AI Governance Lead \u26a1 & @Marcela Distefano\n\n5. @Karen Smiley & @Soulful Learning With AI\n\n\ud83d\udc9f 10 Featured Articles by @JHong , Karo, @Sari Azout, @Farida Khalaf, @Abi Awomosu, AI Governance Lead, Daria Cupareanu, @Kim Doyal, @AI Meets Girlboss, @Mia Kiraki \ud83c\udfad\n\n\ud83c\udfb2 10 Wildcard Picks by @Christina Pagel, @Janelle Teng Wade, @Alesia Zakharova, @Alina Khay, @Myranda | She Loves Stats, @Reality Re-Thunk, @Denise Wakeman, @Chelsey Sidler, @Bonnie Marcus, @Aishwarya Srinivasan\n\nplus 9 top-rated articles in 5 categories:\n\n\ud83d\udcaf Career & Leadership - @Dallas Payne\n\n\ud83d\udcaf Ethics & Society - Abi Awomosu, @Hollis Robbins\n\n\ud83d\udcaf Multiple AI Applications - Daria Cupareanu, @Maggie Vale (2), Kim Doyal\n\n\ud83d\udcaf Product Development - Jenny Ouyang\n\n\ud83d\udcaf Technology - @Jessica Talisman\n\nfor a total of \ud83d\udcf0 352 articles across 16 categories over 7 days, from 667 newsletters by SheWritesAI directory members.","minor":false},{"name":"Louise Humpington","handle":"louisehumpington","comments":6,"first_comment":"2026-04-11","sub_count":448,"comment_url":"https://substack.com/@louisehumpington/note/c-241961448","first_comment_text":"From magic mushrooms to mycelium networks, the yellow brick road to the power of inclusion. My final piece in the Mycelium, Megalomania and Mayhem piece explores what every one of us can do once the harms have been identified to build governance around and within AI in a genuinely transformative manner. \n\nKeen to hear your thoughts. What would you add, what has been missed and what else can the network of accountability connect us to?","minor":false},{"name":"Badass Women in AI","handle":"badasswomeninai","comments":8,"first_comment":"2026-04-17","sub_count":457,"comment_url":"https://substack.com/@badasswomeninai/note/c-244897585","first_comment_text":"Aw, thank you SO much @Alyssa Fu Ward, PhD for all your support. Now I\u2019m the one blushing. ","minor":false},{"name":"April \u2766 The Narrative Nest","handle":"thenarrativenest","comments":14,"first_comment":"2026-04-24","sub_count":476,"comment_url":"https://theslowai.substack.com/p/parenting-with-ai-no-right-way/comment/248481469","first_comment_text":"E. North, I truly appreciate what you are considering here and I\u2019m giving what you say a lot of weight. I\u2019ve been wondering about many of these concerns but have not put them into words as eloquently as you have. \n\n\u201cIn older forms of learning, boredom, silence, and not knowing were not empty spaces. They were often the places where intimacy or inner life developed.\u201d\n\nMy daughter and I have spent a lot of time contemplating literature in these quiet and intimate spaces. And I\u2019m wondering if those explorations can live parallel to some AI use or not at all. I don\u2019t know yet. And I\u2019m holding off much of the technology for now. But I am wrangling with the reality of things to come. So thank you for your thoughtful response.","minor":false},{"name":"Robert C Culwell","handle":"robertcculwell","comments":6,"first_comment":"2026-04-24","sub_count":476,"comment_url":"https://substack.com/@robertcculwell/note/c-248561327","first_comment_text":"A Tapestry and a Casserole \ud83e\udd16\u270d\ud83c\udffc\ud83d\udc58\ud83e\udd58 \n\nhttps://claude.ai/public/artifacts/9c7f625b-b666-4e3a-8f67-b861dee0247a\n\n const parseDate = d3.timeParse("%Y-%m-%d");
const fmtMonth  = d => { const m=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"]; return m[d.getMonth()]+" "+d.getDate(); };
const fmtFull   = d => { const m=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"]; return m[d.getMonth()]+" "+d.getDate()+", "+d.getFullYear(); };

const growth     = data.growth.map(d => ({ date: parseDate(d.date), count: d.count }));
const commenters = data.commenters.map(d => ({ ...d, date: parseDate(d.first_comment) }));

const thresholds = [0, 10, 30, 60, 120, Infinity];
const radii      = [5, 7, 9.5, 13, 18];
function effectiveComments(d) {
  const totalDays = (new Date('2026-05-02') - new Date('2025-10-25')) / 86400000;
  const activeDays = Math.max(7, (new Date('2026-05-02') - new Date(d.first_comment + 'T00:00:00')) / 86400000);
  return Math.round(d.comments * Math.min(2.0, Math.sqrt(totalDays / activeDays)));
}

function getR(n) {
  for (let i = 0; i < thresholds.length - 1; i++)
    if (n >= thresholds[i] && n < thresholds[i+1]) return radii[i];
  return radii[radii.length-1];
}
function hash(s) { let h=0; for (let c of s) h=(h*31+c.charCodeAt(0))&0xfffffff; return h; }
const PIN_SPACE  = 160;
function naturalStem(handle, subCount) {
  const maxS = Math.max(15, PIN_SPACE - 30 - Math.floor(subCount / 6));
  return 10 + (hash(handle) % maxS);
}

let ridicOn = true, ridicTimer = null;
let orangeWalkOn = true, orangeTimer = null;

function pinPhase(handle) {
  return (handle.charCodeAt(0) * 7 + (handle.charCodeAt(1) || 3) * 13) % 100;
}

function startRidiculous() {
  if (ridicTimer) ridicTimer.stop();
  ridicTimer = d3.timer(elapsed => {
    svg.selectAll(".pin-group").each(function(nd) {
      if (!nd || nd._hovered) return;
      const ph  = pinPhase(nd.d.handle);
      let off;
      if (nd.d.minor) {
        off = Math.abs(Math.sin(elapsed / 220 * (0.5 + (ph % 6) * 0.06) + ph)) * 5;
      } else {
        off = Math.sin(elapsed / 170 * (0.7 + (ph % 8) * 0.08) + ph) * (6 + ph % 10);
      }
      d3.select(this).select(".pin-stem").attr("y2", nd.headY + off);
      d3.select(this).select(".pin-head").attr("cy",  nd.headY + off);
      d3.select(this).select(".pin-hit").attr("cy",   nd.headY + off);
    });
  });
}

function stopRidiculous() {
  if (ridicTimer) { ridicTimer.stop(); ridicTimer = null; }
  svg.selectAll(".pin-group").each(function(nd) {
    if (!nd) return;
    d3.select(this).select(".pin-stem").attr("y2", nd.headY);
    d3.select(this).select(".pin-head").attr("cy",  nd.headY);
    d3.select(this).select(".pin-hit").attr("cy",   nd.headY);
  });
}

const _walkers = [];
function spawnWalker(chartW, floorY, sz, startX, imgIdx) {
  const idx = imgIdx !== undefined ? imgIdx : Math.floor(Math.random() * ORANGE_IMGS.length);
  const wsz = idx === 3 ? sz * 0.72 : idx === 7 ? sz * 1.33 : sz;
  const walkerBaseY = floorY - wsz;
  const x = startX !== undefined ? Math.max(0, Math.min(startX - wsz/2, chartW - wsz)) : Math.random() * Math.max(0, chartW - wsz);
  const el = svg.append("image")
    .attr("class", "orange-walker")
    .attr("href", ORANGE_IMGS[idx])
    .attr("width", wsz).attr("height", wsz)
    .attr("y", walkerBaseY).attr("x", x)
    .style("pointer-events", "auto").style("cursor", "pointer");
  const walker = {
    el, x, dir: Math.random() < 0.5 ? 1 : -1,
    speed: 0.03 + Math.random() * 0.15,
    sz: wsz, chartW, baseY: walkerBaseY,
    jumping: false, jumpStart: 0, jumpDur: 0, jumpH: 0
  };
  _walkers.push(walker);
  el.on("click", function(event) {
    event.stopPropagation();
    const svgRect = svg.node().getBoundingClientRect();
    spawnWalker(chartW, floorY, sz, event.clientX - svgRect.left, idx);
  });
  return walker;
}

function startOrangeWalk() {
  stopOrangeWalk();
  const sz = 70;
  const svgEl = svg.node();
  const chartW = svgEl.getBoundingClientRect().width - 8;
  const chartH = svgEl.getBoundingClientRect().height - 36;
  const floorY = chartH + 6;
  const speeds = [0.06, 0.09, 0.07, 0.11, 0.08, 0.10, 0.065, 0.085];
  const starts = [0.04, 0.18, 0.35, 0.52, 0.66, 0.78, 0.88, 0.96];
  ORANGE_IMGS.forEach((img, i) => {
    const wsz = i === 3 ? sz * 0.72 : i === 7 ? sz * 1.33 : sz;
    const walkerBaseY = floorY - wsz;
    const x = starts[i] * chartW;
    const el = svg.append("image")
      .attr("class", "orange-walker")
      .attr("href", img)
      .attr("width", wsz).attr("height", wsz)
      .attr("y", walkerBaseY).attr("x", x)
      .style("pointer-events", "auto").style("cursor", "pointer");
    const walker = {
      el, x, dir: i % 2 === 0 ? 1 : -1,
      speed: speeds[i], sz: wsz, chartW, baseY: walkerBaseY,
      jumping: false, jumpStart: 0, jumpDur: 0, jumpH: 0
    };
    _walkers.push(walker);
    el.on("click", function(event) {
      event.stopPropagation();
      const svgRect = svg.node().getBoundingClientRect();
      spawnWalker(chartW, floorY, sz, event.clientX - svgRect.left, i);
    });
  });
  orangeTimer = d3.timer(elapsed => {
    _walkers.forEach(w => {
      w.x += w.dir * w.speed * 16;
      if (w.x + w.sz > w.chartW) { w.x = w.chartW - w.sz; w.dir = -1; }
      if (w.x < 0) { w.x = 0; w.dir = 1; }
      if (!w.jumping && Math.random() < 0.008) {
        w.jumping = true;
        w.jumpStart = elapsed;
        w.jumpDur = 450 + Math.random() * 350;
        const maxH = 30 + (w.x / w.chartW) * (w.baseY - 30);
        w.jumpH = (0.15 + Math.random() * 0.75) * maxH;
      }
      let yOff = 0;
      if (w.jumping) {
        const t = (elapsed - w.jumpStart) / w.jumpDur;
        if (t >= 1) { w.jumping = false; }
        else { yOff = -w.jumpH * Math.sin(t * Math.PI); }
      }
      w.el.attr("x", w.x).attr("y", w.baseY + yOff);
    });
  });
}
function stopOrangeWalk() {
  if (orangeTimer) { orangeTimer.stop(); orangeTimer = null; }
  svg.selectAll(".orange-walker").remove();
  _walkers.length = 0;
}

function applyRidic() {
  if (ridicOn) startRidiculous(); else stopRidiculous();
}

function draw() {
  svg.selectAll("*").remove();

  const cardsBottom = document.querySelector('.cards').getBoundingClientRect().bottom;
  const margin = { top: 16, right: 8, bottom: 36, left: 0 };
  const totalW = document.documentElement.clientWidth - 64;
  const width  = totalW - margin.left - margin.right;
  const chartH = Math.max(250, window.innerHeight - cardsBottom - margin.top - margin.bottom - 8);

  svg.attr("width", totalW).attr("height", chartH + margin.top + margin.bottom);

  const defs = svg.append("defs");
  const glow = defs.append("filter").attr("id","glow").attr("x","-60%").attr("y","-60%").attr("width","220%").attr("height","220%");
  glow.append("feGaussianBlur").attr("stdDeviation","5").attr("result","blur");
  const fm = glow.append("feMerge");
  fm.append("feMergeNode").attr("in","blur");
  fm.append("feMergeNode").attr("in","SourceGraphic");

  const grad = defs.append("linearGradient").attr("id","areaGrad").attr("x1","0").attr("y1","0").attr("x2","0").attr("y2","1");
  grad.append("stop").attr("offset","0%").attr("stop-color","#F5C99A").attr("stop-opacity",.55);
  grad.append("stop").attr("offset","100%").attr("stop-color","#F5C99A").attr("stop-opacity",.04);

  const g = svg.append("g").attr("transform", `translate(${margin.left},${margin.top})`);
  const x = d3.scaleTime().domain(d3.extent(growth, d => d.date)).range([0, width]);
  const y = d3.scaleLinear().domain([0, 510]).range([chartH, 0]);

  g.selectAll(".gridline").data(y.ticks(5)).join("line")
    .attr("class","gridline").attr("x1",0).attr("x2",width).attr("y1",d=>y(d)).attr("y2",d=>y(d));

  g.append("path").datum(growth).attr("class","area")
    .attr("d", d3.area().x(d=>x(d.date)).y0(y(0)).y1(d=>y(d.count)).curve(d3.curveMonotoneX));
  g.append("path").datum(growth).attr("class","line")
    .attr("d", d3.line().x(d=>x(d.date)).y(d=>y(d.count)).curve(d3.curveMonotoneX));

  g.append("g").attr("class","axis").attr("transform",`translate(0,${chartH})`)
    .call(d3.axisBottom(x).ticks(d3.timeMonth.every(1)).tickFormat(fmtMonth).tickSize(0).tickPadding(10))
    .call(a => a.select(".domain").remove());
  g.append("g").attr("class","axis")
    .call(d3.axisLeft(y).ticks(5).tickSize(0).tickPadding(4))
    .call(a => {
      a.select(".domain").remove();
      a.selectAll("text").attr("x", 4).attr("text-anchor","start").attr("dy","-0.3em");
    });

  g.append("text").attr("class","axis-label")
    .attr("x", 4).attr("y", -6).attr("text-anchor","start")
    .text("subscribers");

  g.append("a").attr("href","https://alyssafuward.substack.com").attr("target","_blank").style("cursor","pointer")
    .append("text").attr("class","watermark")
    .attr("x",width-4).attr("y",chartH-8).attr("text-anchor","end")
    .text("ALYSSAFUWARD.SUBSTACK.COM");

  // Build + simulate nodes
  const nodes = commenters.map(d => {
    const r  = getR(effectiveComments(d)) * (d.minor ? 2 : 1);
    const sl = naturalStem(d.handle, d.sub_count);
    const tx = x(d.date);
    const ty = y(d.sub_count);
    return { d, r, sl, tx, ty, x: tx, y: ty - sl - r };
  });

  d3.forceSimulation(nodes)
    .force("x",       d3.forceX(n => n.tx).strength(1.0))
    .force("y",       d3.forceY(n => n.ty - n.sl - n.r).strength(0.15))
    .force("collide", d3.forceCollide(n => n.r + 5))
    .stop().tick(500);

  nodes.forEach(n => {
    n.x = n.tx;
    n.y = Math.min(n.y, n.ty - n.r - 10);
    n.y = Math.max(n.y, y(500) + n.r + 4);
  });

  function resetPin(grp, nd) {
    grp.select(".pin-stem").interrupt()
      .transition().duration(100).ease(d3.easeQuadOut).attr("y2", nd.headY);
    grp.select(".pin-head").interrupt()
      .transition().duration(100).ease(d3.easeQuadOut)
      .attr("cy", nd.headY).attr("r", nd.r)
      .attr("fill","#E07A10").style("filter","drop-shadow(0 1px 3px rgba(0,0,0,.2))");
  }

  svg.on("mouseleave", () => {
    tip.style("opacity", 0);
    g.selectAll(".pin-group").each(function() {
      const nd = d3.select(this).datum();
      if (nd && nd._hovered) { nd._hovered = false; resetPin(d3.select(this), nd); }
    });
  });

  nodes.forEach(n => {
    const { d, r, tx, ty } = n;
    const headY    = n.y - ty;
    const bigR     = r * 2.5;
    const bigHeadY = headY - 28;

    const grp = g.append("g").attr("class","pin-group")
      .datum({ d, r, bigR, headY, bigHeadY, tx, ty })
      .attr("transform", `translate(${tx},${ty})`);

    grp.append("line").attr("class","pin-stem")
      .attr("x1",0).attr("y1",0).attr("x2",0).attr("y2",headY)
      .attr("stroke", d.minor ? "#c8a88a" : "#d4700f")
      .attr("stroke-width", d.minor ? 1 : 1.5)
      .attr("stroke-opacity", d.minor ? .35 : .65)
      .style("pointer-events","none");

    grp.append("circle").attr("class","pin-head")
      .attr("cx",0).attr("cy",headY).attr("r",r)
      .attr("fill", d.minor ? "#f0c090" : "#E07A10")
      .attr("stroke","white").attr("stroke-width", d.minor ? 1 : 2)
      .attr("opacity", d.minor ? 0.5 : 1)
      .style("filter", d.minor ? "none" : "drop-shadow(0 1px 3px rgba(0,0,0,.2))")
      .style("cursor","pointer")
      .on("click", () => {
        const nd = d3.select(grp.node()).datum();
        const url = nd.d.comment_url || nd.d.url || `https://substack.com/@${nd.d.handle}`;
        window.open(url, "_blank");
      });

    grp.append("circle").attr("class","pin-hit")
      .attr("cx",0).attr("cy",headY).attr("r",r).attr("fill","transparent")
      .on("mouseenter", function() {
        const nd = d3.select(grp.node()).datum();
        if (nd._hovered) return;
        nd._hovered = true;
        grp.raise();
        grp.select(".pin-stem").interrupt()
          .transition().duration(85).ease(d3.easeBackOut.overshoot(1.2)).attr("y2", nd.bigHeadY);
        grp.select(".pin-head").interrupt()
          .transition().duration(85).ease(d3.easeBackOut.overshoot(1.2))
          .attr("cy", nd.bigHeadY).attr("r", nd.bigR)
          .attr("fill","#f08020").style("filter","url(#glow)");
        const preview = nd.d.first_comment_text
          ? nd.d.first_comment_text.slice(0,120) + (nd.d.first_comment_text.length > 120 ? '…' : '')
          : '';
        tip.style("opacity",1).html(`
          <div class="tip-name">${nd.d.name}</div>
          <div class="tip-detail" style="margin-bottom:6px">First comment: ${fmtFull(nd.d.date)}</div>
          ${preview ? `<div class="tip-quote">"${preview}"</div>` : ''}
          <div class="tip-link">↗ view comment</div>
        `);
      })
      .on("mousemove", event => {
        tip.style("left",(event.clientX+16)+"px").style("top",(event.clientY-12)+"px");
      })
      .on("mouseleave", function() {
        const nd = d3.select(grp.node()).datum();
        nd._hovered = false;
        resetPin(grp, nd);
        tip.style("opacity",0);
      })
      .on("click", () => {
        const nd = d3.select(grp.node()).datum();
        const url = nd.d.comment_url || nd.d.url || `https://substack.com/@${nd.d.handle}`;
        window.open(url, "_blank");
      });
  });

  applyRidic();
  if (orangeWalkOn) startOrangeWalk();
}

draw();
(function() {
  const btn = document.getElementById('info-btn');
  const pop = document.getElementById('info-popover');
  btn.addEventListener('click', e => {
    e.stopPropagation();
    if (pop.style.display === 'block') { pop.style.display = 'none'; return; }
    const rect = btn.getBoundingClientRect();
    pop.style.left = Math.max(8, rect.left) + 'px';
    pop.style.top  = (rect.bottom + 6) + 'px';
    pop.style.display = 'block';
  });
  document.addEventListener('click', () => pop.style.display = 'none');


  document.getElementById('toggle-ridic').addEventListener('click', function(e) {
    e.stopPropagation();
    ridicOn = !ridicOn;
    applyRidic();
    this.textContent = ridicOn ? 'Stop the madness 😅' : 'Ridiculous mode 🎉';
    this.classList.toggle('active', ridicOn);
  });
  document.getElementById('toggle-oranges').addEventListener('click', function(e) {
    e.stopPropagation();
    orangeWalkOn = !orangeWalkOn;
    orangeWalkOn ? startOrangeWalk() : stopOrangeWalk();
    this.textContent = orangeWalkOn ? '🍊 stop oranges' : '🍊 walking oranges';
    this.classList.toggle('active', orangeWalkOn);
  });
})();
// Populate nav panel (sorted by first_comment date, then name)
(function() {
  const panel = document.getElementById('nav-panel');
  const toggle = document.getElementById('nav-toggle');
  
  const sorted = [...data.commenters].sort((a,b) => a.first_comment.localeCompare(b.first_comment) || a.name.localeCompare(b.name));
  
  const search = document.createElement('input');
  search.id = 'nav-search';
  search.placeholder = 'search…';
  search.addEventListener('input', () => {
    const q = search.value.trim().toLowerCase();
    grid.querySelectorAll('a').forEach(a => {
      a.style.display = !q || a.dataset.name.includes(q) ? '' : 'none';
    });
  });
  panel.appendChild(search);
  const grid = document.createElement('div');
  grid.className = 'nav-grid';
  sorted.forEach(d => {
    const a = document.createElement('a');
    a.href = '#';
    a.dataset.name = d.name.toLowerCase();
    const mo = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    const dt = new Date(d.first_comment + 'T00:00:00');
    const dateStr = mo[dt.getMonth()] + ' ' + dt.getDate();
    a.innerHTML = d.name + `<span class="nav-date">${dateStr}</span>`;
    a.addEventListener('click', e => {
      e.preventDefault();
      panel.style.display = 'none';
      toggle.textContent = 'all commenters ▾';
      svg.selectAll(".pin-group").each(function(nd) {
        if (!nd || !nd.d || nd.d.handle !== d.handle) return;
        if (nd._hovered) return;
        nd._hovered = true;
        const grp = d3.select(this);
        grp.raise();
        grp.select(".pin-stem").interrupt()
          .transition().duration(85).ease(d3.easeBackOut.overshoot(1.2)).attr("y2", nd.bigHeadY);
        grp.select(".pin-head").interrupt()
          .transition().duration(85).ease(d3.easeBackOut.overshoot(1.2))
          .attr("cy", nd.bigHeadY).attr("r", nd.bigR)
          .attr("fill","#f08020").style("filter","url(#glow)");
        const svgRect = svg.node().getBoundingClientRect();
        const pinScreenY = svgRect.top + window.scrollY + 16 + nd.ty + nd.bigHeadY;
        window.scrollTo({ top: pinScreenY - window.innerHeight / 2, behavior: 'smooth' });
        const preview = nd.d.first_comment_text
          ? nd.d.first_comment_text.slice(0,120) + (nd.d.first_comment_text.length > 120 ? '…' : '')
          : '';
        tip.style("opacity",1)
          .style("left", (svgRect.left + nd.tx + nd.bigR + 12) + "px")
          .style("top",  (svgRect.top + 16 + nd.ty + nd.bigHeadY - 10) + "px")
          .html(`
            <div class="tip-name">${nd.d.name}</div>
            <div class="tip-detail" style="margin-bottom:6px">First comment: ${fmtFull(nd.d.date)}</div>
            ${preview ? `<div class="tip-quote">"${preview}"</div>` : ''}
            <div class="tip-link">↗ view comment</div>
          `);
        setTimeout(() => {
          if (!nd._hovered) return;
          nd._hovered = false;
          grp.select(".pin-stem").interrupt()
            .transition().duration(100).ease(d3.easeQuadOut).attr("y2", nd.headY);
          grp.select(".pin-head").interrupt()
            .transition().duration(100).ease(d3.easeQuadOut)
            .attr("cy", nd.headY).attr("r", nd.r)
            .attr("fill","#E07A10").style("filter","drop-shadow(0 1px 3px rgba(0,0,0,.2))");
          tip.style("opacity", 0);
        }, 4000);
      });
    });
    grid.appendChild(a);
  });
  panel.appendChild(grid);
  
  toggle.addEventListener('click', () => {
    const open = panel.style.display === 'block';
    panel.style.display = open ? 'none' : 'block';
    toggle.textContent = open ? 'all commenters ▾' : 'all commenters ▴';
  });
})();
let resizeTimer;
window.addEventListener("resize", () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(draw, 120);
});
</script>
